services:
  app:
    build:
      context: .
    env_file:
      - .env
    environment:
      TH_DATA_DIR: ${TH_DATA_DIR:-/data}
      TH_PORT: 8000
    ports:
      # ADR 0005: bind to localhost so the User supplies the VPN/proxy/Tailscale perimeter.
      - "127.0.0.1:${TH_PORT:-8000}:8000"
    volumes:
      - trackhealth_data:${TH_DATA_DIR:-/data}

volumes:
  trackhealth_data:
